services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-researchpw}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2g"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-researchpw}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    # maxmemory: tune to your machine / repo size. The pipeline now trims streams
    #   as they are consumed (see broker.read_all trim=), so memory is reclaimed
    #   during the run; this ceiling only needs to hold the in-flight backlog.
    # noeviction: never silently drop queued work — fail loudly instead. If you
    #   hit OOM, raise REDIS_MAXMEMORY or process the repo in smaller chunks.
    command: >
      redis-server --save 60 1
      --maxmemory ${REDIS_MAXMEMORY:-2gb}
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  neo4j_data:
  mongo_data:
  redis_data:
