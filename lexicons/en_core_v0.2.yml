  - {id: "controversy", lemma: "controversy", pos: "NOUN", category: "shared_feature", subcategory: "disagreement",               polarity: "neutral",    source: "Janich & Simmerling 2013 (demoted → disagreement, not NK)", weight: 0.3, status: "candidate"}
  - {id: "error_n",     lemma: "error",       pos: "NOUN", category: "shared_feature", subcategory: "defect",                     polarity: "pejorative", source: "SE pilot (demoted C-10)", weight: 0.2, status: "candidate", requires_context: "'unknown/mysterious error' — defect alone is not NK"}
