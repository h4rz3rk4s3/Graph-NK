# ─────────────────────────────────────────────────────────────────────────────
# GraphRAG-NK — Non-Knowledge Lexicon  v0.2
# ─────────────────────────────────────────────────────────────────────────────
# Successor to en_core_v0.1.yml. Changes are summarised in MARKER_REVIEW.md §5.
# Format is IDENTICAL to v0.1 with three OPTIONAL added fields:
#   weight   : float in [0,1] — analysis-time confidence hint (loader may ignore).
#   status   : active | candidate — 'candidate' = keep in graph, exclude from
#              headline counts until empirically validated (MARKER_REVIEW §3.5).
#   requires_context : short note on the scope needed for the item to be NK.
#                      Enforced only for entries the annotator scopes (see
#                      morpho_syntactic_v0.2.yml); advisory otherwise.
#
# Inclusion criteria unchanged (FRAMEWORK_DESIGN §4.3): prototype | fixed_phrase |
# shared_feature. Polarity unchanged: neutral | pejorative | valorising, plus a
# new value `certainty` for boosters (M-6) — NON-NK, kept for contrastive stance.
# ─────────────────────────────────────────────────────────────────────────────

version: "0.2"
language: "en"
curator: "TBD"
last_modified: "2026-04-22"
sources:
  - "Janich & Simmerling (2013). Do I know what I don't know?"
  - "Janich & Simon (2017). Nichtwissen und Unsicherheit in Naturwissenschaften und Mathematik"
  - "Müller & Stegmüller (2019). Corpus-linguistic approaches to uncertainty."
  - "Simmerling & Janich (2015). Rhetorical functions of a 'language of uncertainty' in the mass media."
  - "Lakoff (1973). Hedges: A study in meaning criteria and the logic of fuzzy concepts. doi:10.1007/bf00262952"
  - "Prince, Frader & Bosk (1982). On hedging in physician-physician discourse."
  - "Hyland (1998). Hedging in Scientific Research Articles."
  - "Rubin (2007). Stating with certainty or stating with doubt. doi:10.3115/1614108.1614144"
  - "Bongelli & Zuczkowski et al. — Knowing/Unknowing/Believing (KUB) epistemic stance."
  - "Aikhenvald (2004). Evidentiality."
  - "Channell (1994). Vague Language."

