# rules/categories.yml
#
# Master registry of all Signal categories. Documentation only — nothing in
# the codebase currently loads or enforces this file at runtime (verified
# v0.2). It exists so a human (or a future validator) has one place to see
# every (rule_prefix, layer, category, subcategory) combination in use.
#
# v0.2: regenerated by walking the four pattern/lexicon files themselves
# (lexicons/en_core_v0.2.yml, patterns/morpho_syntactic_v0.2.yml,
# patterns/rhetorical_v0.2.yml, patterns/word_formation_v0.2.yml) rather than
# hand-transcribed, so it cannot drift from what the annotators actually load.
# See MARKER_REVIEW.md for the full rationale behind each category.
#
# Source: FRAMEWORK_DESIGN.md §4.3 table; MARKER_REVIEW.md.
# ─────────────────────────────────────────────────────────────────────────────

version: "0.2"

categories:
  # ── Lexical ──────────────────────────────────────────────────────────────
  - rule_prefix: "lex."
    layer: "lexical"
    category: "prototype"
    subcategories:
      - epistemic_state
      - imprecision
      - not_knowing              # NEW v0.2 — M-1 (KUB 'Unknowing'; Rubin 2007)
      - plausibility_shield       # NEW v0.2 — M-2 (Prince et al. 1982; Hyland 1998)
      - attribution_shield        # NEW v0.2 — M-2/M-5 (Prince et al. 1982; SE register)
      - evidential_inferential    # NEW v0.2 — M-3 (Aikhenvald 2004)
      - evidential_reportative    # NEW v0.2 — M-3 (Aikhenvald 2004)
      - booster                   # NEW v0.2 — M-6, NON-NK contrastive (Hyland 2005)
    source: "Janich & Simon 2017; Janich & Simmerling 2013; Bongelli & Zuczkowski (KUB); Prince et al. 1982; Hyland 1998; Aikhenvald 2004; Hyland 2005"

  - rule_prefix: "lex."
    layer: "lexical"
    category: "fixed_phrase"
    subcategories:
      - visibility_metaphor
      - gap_phrase
      - repro_gap                 # NEW v0.2 — M-5 (works_on_my_machine)
      - opacity                   # NEW v0.2 — M-5 (black_box, cargo_cult)
    source: "Simmerling & Janich 2015; SE idiom"

  - rule_prefix: "lex."
    layer: "lexical"
    category: "shared_feature"
    subcategories:
      - absence_of_X
      - pending_resolution
      - non_deterministic_behaviour
      - spec_gap
      - doc_gap
      - decision_under_uncertainty # DEMOTED v0.2 — C-10 (was prototype: risk)
      - disagreement                # DEMOTED v0.2 — C-10 (was prototype: controversy)
      - defect                      # DEMOTED v0.2 — C-10 (was prototype: bug/error)
      - repro_gap                   # NEW v0.2 — M-5
      - opacity                     # NEW v0.2 — M-5 (magic, voodoo)
      - code_comment_marker         # NEW v0.2 — M-5 (TODO/FIXME/HACK)
      - general_extender            # NEW v0.2 — M-7 (Channell 1994)
    source: "Müller & Stegmüller 2019; SE pilot; SE idiom; Channell 1994 (MARKER_REVIEW C-10 for the demotions)"

  # ── Morpho-syntactic ─────────────────────────────────────────────────────
  - rule_prefix: "morph.epi."
    layer: "morpho_syntactic"
    category: "epistemic_verb"
    subcategories:
      - not_knowing
    source: "Bongelli & Zuczkowski (KUB); Rubin 2007 — NEW FAMILY v0.2, M-1, DependencyMatcher-scoped"

  - rule_prefix: "morph.hedge."
    layer: "morpho_syntactic"
    category: "hedging"
    subcategories:
      - adverbial
      - approximator
      - plausibility_shield   # NEW v0.2 — M-2, DependencyMatcher-scoped
      - attribution_shield    # NEW v0.2 — M-2 ("as far as I know")
    source: "Szarvas et al. 2012; Vincze et al. 2008; Prince et al. 1982; Hyland 1998; Lakoff 1973"

  - rule_prefix: "morph.evid."
    layer: "morpho_syntactic"
    category: "evidential"
    subcategories:
      - inferential
      - reportative
    source: "Aikhenvald 2004; Vold 2006 — NEW FAMILY v0.2, M-3/C-6/C-7 (seem/appear/suggest/indicate moved here from modality)"

  - rule_prefix: "morph.mod."
    layer: "morpho_syntactic"
    category: "modality"
    subcategories:
      - epistemic               # v0.2 C-1: now ONLY may/might/must+be/have, high confidence
      - epistemic_prediction     # NEW v0.2 — epistemic will/'ll
      - underspecified           # NEW v0.2 — C-1: can/could/would, low weight (was epistemic in v0.1)
      - deontic
    source: "Hyland 1998; Vold 2006; Morante & Sporleder 2012; Marshman 2008 (MARKER_REVIEW C-1 for the modal-sense split)"

  - rule_prefix: "morph.neg."
    layer: "morpho_syntactic"
    category: "negation"
    subcategories:
      - scoped_epistemic   # NEW v0.2 — C-3, DependencyMatcher-scoped (the precision fix)
      - bare_negation       # RENAMED v0.2 — C-3: was adverbial_not, now explicitly a low-weight modifier, not standalone NK
      - quantifier_no
    source: "Vincze et al. 2008; Morante & Sporleder 2012; Helmer et al. 2016 (MARKER_REVIEW C-3 for the scoping fix)"

  - rule_prefix: "morph.syn."
    layer: "morpho_syntactic"
    category: "syntactic_pattern"
    subcategories:
      - question_answer     # hardcoded unit-level check in morpho_syntactic.py, not YAML
      - adversative           # DEMOTED v0.2 — C-9: low-weight co-occurrence modifier
      - embedded_question     # NEW v0.2 — M-4 (San Roque et al. 2015)
      - tag_question           # NEW v0.2 — M-4
      - question_mark          # DEMOTED v0.2 — M-4: low weight, no longer standalone NK
    source: "Bongelli et al. 2018; Simon 2020; San Roque et al. 2015 (MARKER_REVIEW C-9/M-4)"

  - rule_prefix: "morph.tense."
    layer: "morpho_syntactic"
    category: "tense"
    subcategories:
      - past_nk    # FIXED v0.2 — C-4: was a buggy double-'yet' token pattern, now DependencyMatcher
      - future_nk
    source: "Janich 2020 (MARKER_REVIEW C-4 for the past_nk bug fix)"

  # ── Word-formation ────────────────────────────────────────────────────────
  - rule_prefix: "affix.prefix."
    layer: "word_formation"
    category: "affix_negation"
    subcategories:
      - un_prefix
      - in_prefix
      - non_prefix
      - dis_prefix
      - under_prefix   # NEW v0.2 — C-8 (rescues underspecified/underdocumented/underdetermined)
      - mis_prefix      # NEW v0.2 (misunderstand/misinterpret — process NK)
    source: "Janich & Simmerling 2013 (MARKER_REVIEW C-8 for the under- blocklist fix)"

  - rule_prefix: "affix.suffix."
    layer: "word_formation"
    category: "affix_negation"
    subcategories:
      - less_suffix
    source: "Janich & Simmerling 2013"

  - rule_prefix: "affix.suffix."
    layer: "word_formation"
    category: "shared_feature"
    subcategories:
      - epistemic_potentiality  # RELABELLED v0.2 — C-2: was affix_modality/able_suffix, now allowlist-only
      - privative_certainty      # NEW v0.2 — the -free suffix, deliberate NON-NK contrastive control
    source: "Janich & Simmerling 2013 (MARKER_REVIEW C-2 for the -able relabel + allowlist fix)"

  # ── Rhetorical ───────────────────────────────────────────────────────────
  - rule_prefix: "rhetor."
    layer: "rhetorical"
    category: "metaphor"
    subcategories:
      - spatial_journey
      - visibility
      - container
      - opacity        # NEW v0.2 — black_box, magic (SE-frequent)
      - obscurity        # NEW v0.2 — fog/murky/hazy
      - hidden_extent     # NEW v0.2 — iceberg, rabbit_hole, can_of_worms
    source: "Simmerling & Janich 2015; Smithson 2008; SE idiom"

  - rule_prefix: "rhetor."
    layer: "rhetorical"
    category: "personification"
    subcategories:
      - poor_cousin
      - avoidance
    source: "Simmerling & Janich 2015"

  - rule_prefix: "rhetor."
    layer: "rhetorical"
    category: "comparison"
    subcategories:
      - approximator
    source: "Simmerling & Janich 2015 (MARKER_REVIEW C-5: 'kind of/sort of' duplicate removed — hedging layer only now)"

  # ── Classifier ────────────────────────────────────────────────────────────
  - rule_prefix: "clf."
    layer: "classifier"
    category: "roberta_binary"
    subcategories: []
    source: "RoBERTa fine-tuned NK classifier (see settings.classifier_model_path)"

# ─────────────────────────────────────────────────────────────────────────────
